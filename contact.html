<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SaverBites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Copy your existing navigation header here -->

    <main class="section" style="max-width: 600px; margin: 0 auto; padding: 40px 20px;">
        <h1>Contact SaverBites</h1>
        <p>Have questions about our recipe cost audits or budget breakdowns? Drop us a message below!</p>
        
        <!-- Since it's a static GitHub site, you can use a free service like Formspree or just a mailto link -->
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <label>Your Email:
                <input type="email" name="email" required style="width: 100%; padding: 10px; margin-top: 5px;">
            </label>
            <label>Message:
                <textarea name="message" required style="width: 100%; padding: 10px; height: 150px; margin-top: 5px;"></textarea>
            </label>
            <button type="submit" style="background-color: #FFC820; color: #141312; padding: 10px; border: none; font-weight: bold; cursor: pointer;">Send Message</button>
        </form>
    </main>

    <!-- Copy your existing footer here -->
</body>
</html>
